# Configurazione Netlify — sito statico (HTML/CSS/JS puro)
# Nessun passaggio di build: i file vengono pubblicati così come sono.

[build]
  publish = "."

# Pagina 404 personalizzata (se in futuro ne aggiungi una, crea 404.html nella root)

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Asset sempre rivalidati: il browser controlla se sono cambiati a ogni visita
# (con ETag → risposta 304 veloce se invariati). Così le modifiche a CSS/JS si
# vedono subito, senza dover svuotare la cache.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
